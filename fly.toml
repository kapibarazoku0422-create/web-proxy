# fly.toml app configuration file generated for web-proxy on 2026-06-21T22:15:53Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'web-proxy'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
