# fly.toml - "app" の値は fly launch 時に自動で書き換わる
app = "web-proxy-changeme"
primary_region = "nrt"  # 東京リージョン

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true   # アクセスがないと自動停止（無料枠節約）
  auto_start_machines = true  # リクエストで自動起動
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
